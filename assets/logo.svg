<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Дархан — эмблема">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c878"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9c7a2e"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#gold)" stroke-width="2.4" stroke-linecap="round">
    <circle cx="60" cy="60" r="55"/>
    <circle cx="60" cy="60" r="47" stroke-width="1.2" opacity="0.7"/>
    <!-- лотос / чакра: 8 лепестков -->
    <g>
      <ellipse cx="60" cy="31" rx="8.5" ry="17"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(45 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(90 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(135 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(180 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(225 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(270 60 60)"/>
      <ellipse cx="60" cy="31" rx="8.5" ry="17" transform="rotate(315 60 60)"/>
    </g>
    <circle cx="60" cy="60" r="11"/>
    <circle cx="60" cy="60" r="3.4" fill="url(#gold)" stroke="none"/>
    <!-- точки-«драгоценности» -->
    <g fill="url(#gold)" stroke="none">
      <circle cx="60" cy="9" r="2.2"/>
      <circle cx="111" cy="60" r="2.2"/>
      <circle cx="60" cy="111" r="2.2"/>
      <circle cx="9" cy="60" r="2.2"/>
    </g>
  </g>
</svg>
